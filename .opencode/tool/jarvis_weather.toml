---
tool: jarvis_weather
description: Get current weather for a location
parameters:
  type: object
  properties:
    location:
      type: string
      description: City name or location (e.g., "London", "New York", "Paris")
  required: [location]
---

import urllib.request
import urllib.parse

def main(location: str) -> dict:
    try:
        encoded = urllib.parse.quote(location)
        url = f"https://wttr.in/{encoded}?format=%C+%t+%w+%h&lang=en"
        req = urllib.request.Request(url, headers={"User-Agent": "curl/8.0"})
        with urllib.request.urlopen(req, timeout=10) as resp:
            data = resp.read().decode().strip()
        return {"success": True, "result": f"Weather in {location}: {data}"}
    except Exception as e:
        return {"success": False, "error": f"Weather error: {e}"}