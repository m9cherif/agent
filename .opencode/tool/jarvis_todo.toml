---
tool: jarvis_todo
description: Manage todo list
parameters:
  type: object
  properties:
    action:
      type: string
      enum: [add, list, done, delete, clear]
      description: Action to perform
    task:
      type: string
      description: Task text (for add)
    id:
      type: string
      description: Task ID (for done/delete)
    priority:
      type: string
      enum: [low, medium, high]
      default: medium
      description: Task priority
  required: [action]
---

import json
import os
import time
import datetime

TODO_FILE = os.path.join(os.environ.get("APPDATA", os.path.expanduser("~")), "JarvisAssistant", "todos.json")
os.makedirs(os.path.dirname(TODO_FILE), exist_ok=True)
if not os.path.exists(TODO_FILE):
    with open(TODO_FILE, "w") as f:
        json.dump([], f)

def _load():
    with open(TODO_FILE, "r") as f:
        return json.load(f)

def _save(todos):
    with open(TODO_FILE, "w") as f:
        json.dump(todos, f, indent=2)

def main(action: str, task: str = "", id: str = "", priority: str = "medium") -> dict:
    todos = _load()
    
    if action == "add":
        if not task:
            return {"success": False, "error": "Task required"}
        todos.append({
            "id": str(time.time()),
            "task": task,
            "priority": priority,
            "done": False,
            "created": datetime.datetime.now().isoformat()
        })
        _save(todos)
        return {"success": True, "result": f"Added: {task}"}
    
    elif action == "list":
        filter_done = None  # all
        if not todos:
            return {"success": True, "result": "No tasks"}
        
        lines = []
        for t in todos:
            status = "✓" if t["done"] else "☐"
            pri = t.get("priority", "medium")[0].upper()
            lines.append(f"{status} [{pri}] {t['task']}")
        return {"success": True, "result": "\n".join(lines)}
    
    elif action == "done":
        for t in todos:
            if t["id"] == id:
                t["done"] = True
                _save(todos)
                return {"success": True, "result": f"Completed: {t['task']}"}
        return {"success": False, "error": "Task not found"}
    
    elif action == "delete":
        todos = [t for t in todos if t["id"] != id]
        _save(todos)
        return {"success": True, "result": "Removed"}
    
    elif action == "clear":
        _save([t for t in todos if not t["done"]])
        return {"success": True, "result": "Cleared completed"}
    
    return {"success": False, "error": "Actions: add, list, done, delete, clear"}