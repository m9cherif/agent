---
tool: jarvis_calculator
description: Evaluate mathematical expressions
parameters:
  type: object
  properties:
    expression:
      type: string
      description: Mathematical expression to evaluate (e.g., "2+2", "15*24", "sqrt(16)")
  required: [expression]
---

import math
import re

def main(expression: str) -> dict:
    try:
        safe = re.sub(r"[^0-9+\-*/.()% eE ]", "", expression)
        result = eval(safe, {"__builtins__": {}}, {"math": math})
        return {"success": True, "result": f"{expression} = {result}"}
    except Exception as e:
        return {"success": False, "error": f"Calc error: {e}"}