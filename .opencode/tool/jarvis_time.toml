---
tool: jarvis_time
description: Get current local and UTC time
parameters:
  type: object
  properties:
    timezone:
      type: string
      description: Optional timezone name (e.g., "US/Eastern", "Europe/London")
  required: []
---

import datetime
import zoneinfo

def main(timezone: str = "") -> dict:
    try:
        now = datetime.datetime.now(datetime.timezone.utc).astimezone()
        result = now.strftime("%A, %B %d, %Y at %I:%M:%S %p %Z")
        utc = datetime.datetime.now(datetime.timezone.utc)
        utc_str = utc.strftime("%Y-%m-%d %H:%M:%S UTC")
        
        if timezone:
            try:
                tz = zoneinfo.ZoneInfo(timezone)
                tz_time = now.astimezone(tz)
                result += f"\n{timezone}: {tz_time.strftime('%I:%M:%S %p %Z')}"
            except:
                return {"success": False, "error": f"Unknown timezone: {timezone}"}
        
        return {"success": True, "result": f"Local time: {result}\nUTC: {utc_str}"}
    except Exception as e:
        return {"success": False, "error": f"Time error: {e}"}