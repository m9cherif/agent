---
tool: jarvis_define
description: Get word definition
parameters:
  type: object
  properties:
    word:
      type: string
      description: Word to define
  required: [word]
---

import urllib.request
import urllib.parse
import json

def main(word: str) -> dict:
    try:
        url = f"https://api.dictionaryapi.dev/api/v2/entries/en/{urllib.parse.quote(word)}"
        req = urllib.request.Request(url, headers={"User-Agent": "Jarvis/1.0"})
        with urllib.request.urlopen(req, timeout=10) as resp:
            data = json.loads(resp.read())[0]
        
        meanings = data.get("meanings", [])
        parts = []
        for m in meanings[:3]:
            defs = m.get("definitions", [])[:2]
            def_texts = [f"  - {d.get('definition', '')}" for d in defs]
            parts.append(f"*{m.get('partOfSpeech', '?')}*:\n" + "\n".join(def_texts))
        
        phonetic = data.get("phonetic", data.get("phonetics", [{}])[0].get("text", ""))
        result = f"**{word}** {phonetic}\n" + "\n".join(parts)
        return {"success": True, "result": result}
    except urllib.error.HTTPError as e:
        return {"success": False, "error": "Word not found" if e.code == 404 else f"Error: {e}"}
    except Exception as e:
        return {"success": False, "error": f"Dict error: {e}"}